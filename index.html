<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>RunSafari - Sammle Tiere!</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-content">
        
        <section id="view-collection" class="view">
            <header>
                <h1>🏃🏽‍♂️ RunSafari</h1>
                <p>Willkommen zurück!</p>
            </header>
            
            <div class="home-content">
                <section class="collection-area">
                    <h2>Deine Sammlung (<span id="animalCount">0</span>)</h2>
                    <ul id="collectionList" class="animal-grid">
                        </ul>
                </section>
            </div>
        </section>

        <section id="view-runs" class="view">
            <header>
                <h1>📝 Historie</h1>
                <p>Deine letzten Läufe</p>
            </header>
            
            <div class="home-content">
                <section class="recent-runs">
                    <ul id="runsList" class="list-group">
                        </ul>
                </section>
            </div>
        </section>

        <section id="view-track" class="view active">
            <div id="map-container">
                <div id="map"></div>
            </div>

            <div class="ui-layer">
                <div class="stats-card">
                    <div class="stat">
                        <span class="label" id="stat1-label">Distanz</span>
                        <span class="value" id="stat1-value">0.00 km</span>
                    </div>
                    <div class="stat">
                        <span class="label" id="stat2-label">Zeit</span>
                        <span class="value" id="stat2-value">00:00</span>
                    </div>
                    <div class="stat">
                        <span class="label" id="stat3-label">Ø Pace</span>
                        <span class="value" id="stat3-value">00:00</span>
                    </div>
                </div>

                <div class="status-bar" id="status">Bereit</div>

                <div class="controls">
                    <button id="startBtn" class="btn primary">Start</button>
                    <button id="pauseBtn" class="btn warning" style="display: none;">Pause</button>
                    <button id="stopBtn" class="btn danger" disabled>Stopp</button>
                </div>
            </div>
        </section>

        <section id="view-profile" class="view">
            <header>
                <h1>📦 Inventar</h1>
                <p>Öffne deine gesammelten Boxen!</p>
            </header>
            
            <div class="profile-content">
                <div class="box-status stats-card" style="flex-direction: column; align-items: center; gap: 15px;">
                    <h2>Verfügbare Boxen: <span id="boxCountDisplay" style="color: var(--primary); font-size: 1.5rem;">0</span></h2>
                    <button id="openBoxBtn" class="btn primary" style="width: 100%;">Eine Box öffnen</button>
                </div>

                <div id="boxResult" class="box-result">
                    </div>

                <div class="info-card-toggle" style="margin-top: 30px;">
                    <button id="toggleInfoBtn" class="btn" style="background: #ddd; color: #333; width: 100%;">📊 Wahrscheinlichkeiten ansehen</button>
                </div>
                
                <div id="infoCard" class="info-card" style="display: none; margin-top: 15px;">
                    <ul id="rarityList" class="list-group">
                        </ul>
                </div>
            </div>
        </section>

        <section id="view-settings" class="view">
            <header>
                <h1>⚙️ Profil & UI</h1>
                <p>Passe dein Tracking an</p>
            </header>
            
            <div class="settings-content">
                <div class="stats-card" style="flex-direction: column; text-align: left; gap: 15px;">
                    <h3>🧍🏽‍♂️ Körperdaten</h3>
                    <div class="settings-group">
                        <label>Gewicht (kg):</label>
                        <input type="number" id="setting-weight" class="settings-input" min="30" max="250">
                    </div>
                    <div class="settings-group">
                        <label>Größe (cm):</label>
                        <input type="number" id="setting-height" class="settings-input" min="100" max="250">
                    </div>
                </div>

                <div class="stats-card" style="flex-direction: column; text-align: left; gap: 15px;">
                    <h3>📊 Tracking-Anzeige (3 Slots)</h3>
                    <div class="settings-group">
                        <label>Slot 1:</label>
                        <select id="setting-stat1" class="settings-select">
                            <option value="distance">Distanz (km)</option>
                            <option value="time">Zeit</option>
                            <option value="pace">Ø Pace</option>
                            <option value="kcal">Kalorien (kcal)</option>
                            <option value="fluid">Flüssigkeit (ml)</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>Slot 2:</label>
                        <select id="setting-stat2" class="settings-select">
                            <option value="distance">Distanz (km)</option>
                            <option value="time">Zeit</option>
                            <option value="pace">Ø Pace</option>
                            <option value="kcal">Kalorien (kcal)</option>
                            <option value="fluid">Flüssigkeit (ml)</option>
                        </select>
                    </div>
                    <div class="settings-group">
                        <label>Slot 3:</label>
                        <select id="setting-stat3" class="settings-select">
                            <option value="distance">Distanz (km)</option>
                            <option value="time">Zeit</option>
                            <option value="pace">Ø Pace</option>
                            <option value="kcal">Kalorien (kcal)</option>
                            <option value="fluid">Flüssigkeit (ml)</option>
                        </select>
                    </div>
                </div>
            </div>
        </section>

    </div>

    <nav class="bottom-nav">
        <button class="nav-item" data-target="view-collection">🦁<br>Sammlung</button>
        <button class="nav-item" data-target="view-runs">📝<br>Läufe</button>
        <button class="nav-item active" data-target="view-track">📍<br>Tracken</button>
        <button class="nav-item" data-target="view-profile">📦<br>Boxen</button>
        <button class="nav-item" data-target="view-settings">⚙️<br>UI</button>
    </nav>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="storage.js"></script>
    <script src="tracker.js"></script>
    <script src="app.js"></script>
</body>
</html>
